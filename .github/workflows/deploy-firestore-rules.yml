name: Deploy Firestore Rules

# Manual-dispatch deploy of firestore.rules via scripts/deploy-firestore-rules.py
# (Firebase Rules REST API, CI service-account token). NOTE: the Firestore Rules
# Tests (rules-tests.yml) run on the PR but are NOT a hard `needs`/`workflow_run`
# gate on this deploy — dispatch is a manual, human-reviewed step, so run it only
# after the PR's rules-tests are green.

# NOTE: rules deploy to the `vehicles-in-need` Firebase project (where app data
# lives), but this workflow's WIF auth is on the `gen-lang-client-0615287333`
# infra project. Until the CI service account is granted firebaserules.admin on
# `vehicles-in-need` (cross-project) OR WIF is set up on `vehicles-in-need`, this
# is manual-dispatch only — the auto-on-push trigger is intentionally disabled so
# it can't silently deploy to the wrong project or fail on every rules change.
on:
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write # Required for Workload Identity Federation

jobs:
  deploy-rules:
    name: Deploy Firestore Security Rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        id: auth_wif
        continue-on-error: true
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Authenticate to Google Cloud (Service Account Key fallback)
        if: steps.auth_wif.outcome != 'success'
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY || secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Deploy Firestore rules
        run: python scripts/deploy-firestore-rules.py
